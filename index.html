<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Offline Reader">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Offline Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0a0a0a;
      --surf:   rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #6366f1;
      --text:   #f0f0f0;
      --muted:  #a0a0a0;
    }

    html, body {
      background-color: var(--bg) !important;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overscroll-behavior: none;
      min-height: 100vh;
      line-height: 0; /* Prevents text-based spacing gaps */
    }

    /* ── Upload Screen ── */
    #upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      gap: 2rem;
      text-align: center;
      background: var(--bg);
      line-height: normal;
    }

    .hero-graphic {
      width: 100%;
      max-width: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
      filter: drop-shadow(0 0 20px rgba(99,102,241,0.3));
    }

    h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -.5px; }

    #mobile-upload-btn {
      width: 100%; max-width: 340px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    #mobile-upload-btn:active { 
      background: rgba(255,255,255,0.08); 
      transform: scale(0.97); 
    }
    .btn-icon {
      width: 52px; height: 52px;
      background: rgba(99,102,241,0.15);
      color: var(--accent);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-text { display: flex; flex-direction: column; gap: 0.3rem; }
    .btn-title { font-size: 1.1rem; font-weight: 700; color: #fff; }
    .btn-sub { font-size: 0.85rem; color: var(--muted); }

    #file-input { display: none; }

    /* ── Loading Screen ── */
    #loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.2rem;
      background: var(--bg);
      line-height: normal;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { color: var(--muted); font-size: .9rem; text-align: center; max-width: 280px; }

    /* ── Reader Screen ── */
    #reader-screen {
      display: none;
      width: 100%;
      background: var(--bg);
    }

    #reader-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: calc(.5rem + env(safe-area-inset-top, 0px)) .7rem .6rem;
      background: rgba(10, 10, 10, 0.45);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      line-height: normal;
    }
    #reader-header.ui-hidden { transform: translateY(-100%); }

    #reader-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: .6rem .7rem calc(.6rem + env(safe-area-inset-bottom, 0px));
      background: rgba(10, 10, 10, 0.45);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-top: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      line-height: normal;
    }
    #reader-footer.ui-hidden { transform: translateY(100%); }

    #comic-title {
      flex: 1;
      font-size: .85rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* Seamless Flex Container */
    #reader-pages {
      width: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #reader-pages.mode-chapter .chapter-container:not(.active) {
      display: none !important;
    }

    .chapter-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .reader-decor {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--muted);
      padding: 3rem 0;
    }
    .reader-top-decor {
      padding-top: calc(env(safe-area-inset-top, 0px) + 3rem);
    }
    .reader-bottom-decor {
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 6rem);
    }

    .page-wrapper {
      width: 100%;
      max-width: 800px;
      margin: 0;
      padding: 0;
      background: #000;
      display: block; 
      position: relative;
      aspect-ratio: 2 / 3;
      /* Virtualization prevents CPU crash on 11k images */
      content-visibility: auto;
      contain-intrinsic-size: auto 1000px;
    }

    .comic-page {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      margin: 0;
      padding: 0;
      border: none;
    }
    .comic-page.placeholder {
      background: #080808;
    }

    .chapter-divider {
      padding: 1.5rem 1rem;
      font-size: .75rem; font-weight: 700;
      color: var(--muted);
      background: #0a0a0a;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      width: 100%;
      max-width: 800px;
      line-height: normal;
    }

    .icon-btn {
      background: none; border: none; color: var(--text);
      padding: .5rem; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:active { background: rgba(255,255,255,0.1); }

    #chapter-nav {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    #chapter-label-btn { 
      font-size: .8rem; font-weight: 700; padding: .4rem .8rem; 
      background: var(--surf); border-radius: 12px; margin: 0 .2rem;
      color: var(--text);
      border: 1px solid var(--border);
      transition: background 0.2s;
    }
    #chapter-label-btn:active { background: rgba(255,255,255,0.15); }
    
    #mode-toggle {
      font-size: 1.2rem; font-weight: 700;
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 6px; padding: 0; color: var(--text);
      width: 64px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    #page-indicator { font-size: .75rem; color: var(--text); font-variant-numeric: tabular-nums; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

    #autoscroll-bar {
      position: fixed;
      bottom: calc(4.5rem + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: .6rem;
      background: rgba(10, 10, 10, 0.45);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: .5rem 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
      line-height: normal;
    }
    #autoscroll-bar.ui-hidden { opacity: 0; transform: translateX(-50%) translateY(100px); pointer-events: none; }

    .as-btn {
      background: none; border: none; color: #fff;
      font-size: 1.2rem; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.9;
    }
    .as-btn:active { opacity: 0.5; }
    #as-playpause { background: var(--accent); border-radius: 50%; font-size: .85rem; width: 34px; height: 34px; opacity: 1;}
    #as-speed-label { min-width: 2.5rem; text-align: center; font-size: .85rem; font-weight: 700; opacity: 0.9;}

    #cs-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.5);
      display: flex; flex-direction: column; justify-content: flex-end;
      transition: opacity 0.3s ease;
      line-height: normal;
    }
    #cs-overlay.ui-hidden { opacity: 0; pointer-events: none; }
    
    #cs-modal {
      width: 100%; max-height: 65vh;
      background: rgba(10, 10, 10, 0.45);
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      display: flex; flex-direction: column;
      transform: translateY(0);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    }
    #cs-overlay.ui-hidden #cs-modal { transform: translateY(100%); }

    .cs-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 1.5rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .cs-header h3 { font-size: 1.1rem; margin: 0; font-weight: 700; color: #fff; }
    #cs-close { 
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.05); color: var(--text); 
      width: 30px; height: 30px; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    #cs-list { overflow-y: auto; padding: 0.5rem; -webkit-overflow-scrolling: touch; flex: 1; }
    .cs-item {
      width: 100%; text-align: left; padding: 1rem 1.2rem;
      background: none; border: none; color: var(--text);
      font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.03);
      cursor: pointer; transition: background 0.2s;
      border-radius: 12px;
    }
    .cs-item:active { background: rgba(255,255,255,0.08); }
    .cs-item.active { color: var(--accent); font-weight: 700; background: rgba(99,102,241,0.15); border-color: transparent;}
    .cs-item:last-child { border-bottom: none; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="upload-screen">
    <div class="hero-graphic">
      <svg width="100%" height="48" viewBox="0 0 400 48" fill="var(--accent)">
        <path d="M200 4 L220 24 L200 44 L180 24 Z" opacity="1"/>
        <path d="M200 12 L212 24 L200 36 L188 24 Z" fill="var(--bg)"/>
        <path d="M200 16 L208 24 L200 32 L192 24 Z" opacity="0.8"/>
        <path d="M140 16 L148 24 L140 32 L132 24 Z" opacity="0.6"/>
        <path d="M260 16 L268 24 L260 32 L252 24 Z" opacity="0.6"/>
        <circle cx="90" cy="24" r="2" opacity="0.4"/>
        <circle cx="310" cy="24" r="2" opacity="0.4"/>
        <rect x="20" y="23.5" width="60" height="1" opacity="0.2"/>
        <rect x="100" y="23.5" width="22" height="1" opacity="0.3"/>
        <rect x="156" y="23.5" width="16" height="1" opacity="0.4"/>
        <rect x="320" y="23.5" width="60" height="1" opacity="0.2"/>
        <rect x="278" y="23.5" width="22" height="1" opacity="0.3"/>
        <rect x="228" y="23.5" width="16" height="1" opacity="0.4"/>
      </svg>
    </div>
    <h1>Offline Reader</h1>
    <button id="mobile-upload-btn" onclick="document.getElementById('file-input').click()">
      <div class="btn-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
      </div>
      <div class="btn-text">
        <span class="btn-title">Select Comic Archive</span>
        <span class="btn-sub">Tap to browse .cbz or .zip</span>
      </div>
    </button>
    <input type="file" id="file-input" accept=".cbz,.zip" multiple>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p id="loading-text">Processing archive...</p>
  </div>

  <div id="reader-screen">
    <header id="reader-header">
      <button class="icon-btn" id="close-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span id="comic-title">Comic</span>
      <button id="mode-toggle" class="hidden">∞</button>
    </header>

    <div id="reader-pages"></div>

    <footer id="reader-footer">
      <span id="page-indicator">0/0</span>
      <div id="chapter-nav" class="hidden">
        <button class="icon-btn" id="prev-ch"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <button class="icon-btn" id="chapter-label-btn">1/1</button>
        <button class="icon-btn" id="next-ch"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <button class="icon-btn" id="autoscroll-toggle" style="margin-left: auto;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
      </button>
    </footer>

    <div id="autoscroll-bar" class="ui-hidden">
      <button class="as-btn" id="as-mode-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
      </button>
      <button class="as-btn" id="as-slower">−</button>
      <button class="as-btn" id="as-playpause">
        <svg style="transform: translateX(1px)" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
      </button>
      <span id="as-speed-label">•</span>
      <button class="as-btn" id="as-faster">+</button>
    </div>

    <div id="cs-overlay" class="ui-hidden">
      <div id="cs-modal">
        <div class="cs-header">
          <h3>Select Chapter</h3>
          <button id="cs-close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <div id="cs-list"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

    // --- State ---
    let pages = [], chapters = [], blobUrls = [], currentPage = 0, currentChIdx = 0;
    let chapterMode = true, autoRunning = false, speedIdx = 3, uiHidden = false, autoscrollEnabled = false;
    let maxChapterNum = 0, baseChapterOffset = 0, isTransitioning = false;
    let scrollMode = 'smooth', jumpIntervalIdx = 3, isJumping = false, jumpStartY = 0, jumpTargetY = 0, jumpStartTime = 0;

    const JUMP_DURATION = 120;
    const JUMP_LEVELS = [8, 6, 4, 3, 2, 1.5, 1, 0.75, 0.5]; 
    const SPEED_LEVELS = [1.0, 1.6, 2.5, 4.0, 6.0, 9.0, 13.0, 18.0];
    
    // Memory Management - Massive windows for 11k images
    const MEMORY_WINDOW = 30; 
    const IMAGE_EXT = /\.(jpe?g|png|webp|gif|bmp|avif)$/i;
    const ARCHIVE_EXT = /\.(cbz|zip)$/i;
    const GEOMETRIC_SVG = `<svg width="180" height="16" viewBox="0 0 180 16" fill="currentColor"><path d="M90 0L98 8L90 16L82 8L90 0Z" opacity="0.9"/><circle cx="60" cy="8" r="2" opacity="0.5"/><circle cx="120" cy="8" r="2" opacity="0.5"/><rect x="10" y="7.5" width="30" height="1" opacity="0.3"/><rect x="140" y="7.5" width="30" height="1" opacity="0.3"/></svg>`;

    const uploadScreen = document.getElementById('upload-screen'), loadingScreen = document.getElementById('loading-screen'), readerScreen = document.getElementById('reader-screen'), readerPages = document.getElementById('reader-pages'), fileInput = document.getElementById('file-input'), loadingText = document.getElementById('loading-text'), comicTitle = document.getElementById('comic-title'), pageIndicator = document.getElementById('page-indicator'), autoscrollBar = document.getElementById('autoscroll-bar'), readerHeader = document.getElementById('reader-header'), readerFooter = document.getElementById('reader-footer'), chapterNav = document.getElementById('chapter-nav'), modeToggle = document.getElementById('mode-toggle'), chapterLabelBtn = document.getElementById('chapter-label-btn'), csOverlay = document.getElementById('cs-overlay'), csList = document.getElementById('cs-list'), csClose = document.getElementById('cs-close');

    function naturalSort(a, b) { return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }); }
    function basename(path) { return path.replace(/^.*[\\/]/, ''); }
    function showScreen(id) {
      [uploadScreen, loadingScreen, readerScreen].forEach(s => s.style.display = 'none');
      const t = document.getElementById(id); if (t) t.style.display = id === 'reader-screen' ? 'block' : 'flex';
    }

    function extractChapterInfo(filename) {
      let name = basename(filename).replace(/\.(cbz|zip)$/i, '').replace(/_/g, ' ');
      let displayNum = null;
      const numMatch = name.match(/(?:c|ch|chapter|vol|volume)\.?\s*0*(\d+(\.\d+)?)/i);
      if (numMatch) displayNum = parseFloat(numMatch[1]);
      else {
          const fallbackMatch = name.match(/(?:-\s+|\[)0*(\d+(\.\d+)?)/);
          if (fallbackMatch) displayNum = parseFloat(fallbackMatch[1]);
      }
      let cleanName = name.split(/\s+-\s+/).pop().trim();
      cleanName = cleanName.replace(/^(?:c|ch|chapter|v|vol|volume)\.?\s*0*\d+(\.\d+)?\s+/i, '');
      if (/^(?:c|ch|chapter|v|vol|volume)?\.?\s*0*\d+(\.\d+)?$/i.test(cleanName)) cleanName = `Chapter ${parseFloat(cleanName.match(/\d+(\.\d+)?/)[0])}`;
      return { displayNum, cleanName };
    }

    async function extractEntries(zip, fallbackName) {
      const allFiles = Object.values(zip.files).filter(f => !f.dir).sort((a, b) => naturalSort(a.name, b.name));
      const archives = allFiles.filter(f => ARCHIVE_EXT.test(f.name));
      const images = allFiles.filter(f => IMAGE_EXT.test(f.name));
      if (!archives.length) return images.length ? [{ images, name: fallbackName }] : [];
      const result = [];
      for (const arch of archives) {
        try {
          const inner = await JSZip.loadAsync(await arch.async('arraybuffer'));
          const imgs = Object.values(inner.files).filter(f => !f.dir && IMAGE_EXT.test(f.name)).sort((a, b) => naturalSort(a.name, b.name));
          if (imgs.length) result.push({ images: imgs, name: basename(arch.name) });
        } catch (e) {}
      }
      if (images.length) result.unshift({ images, name: 'Extras' });
      return result;
    }

    fileInput.addEventListener('change', async e => {
      const files = Array.from(e.target.files).filter(f => ARCHIVE_EXT.test(f.name));
      if (!files.length) return;
      showScreen('loading-screen');
      pages = []; chapters = []; blobUrls.forEach(URL.revokeObjectURL); blobUrls = [];
      readerPages.innerHTML = ''; window.scrollTo(0, 0); 
      comicTitle.textContent = files[0].name.replace(/\.(cbz|zip)$/i, '').replace(/_/g, ' ').replace(/\s*(?:-?\s*(?:c|ch|vol|chapter|volume)\.?\s*\d+).*$/i, '').trim();
      files.sort((a,b) => naturalSort(a.name, b.name));
      for (const f of files) {
        try {
          const zip = await JSZip.loadAsync(await f.arrayBuffer());
          const groups = await extractEntries(zip, f.name);
          groups.forEach(g => {
            const start = pages.length;
            g.images.forEach(entry => pages.push({ entry, url: null, loading: false, aspectLocked: false }));
            const info = extractChapterInfo(g.name);
            chapters.push({ ...info, start, end: pages.length - 1 });
          });
        } catch (err) {}
      }
      const validNums = chapters.map(c => c.displayNum).filter(n => n !== null);
      if (validNums.length > 0) { maxChapterNum = Math.max(...validNums); baseChapterOffset = Math.min(...validNums) - 1; }
      else maxChapterNum = chapters.length;
      renderPages(); showScreen('reader-screen');
      uiHidden = false; updateUI(); resetIdle(); setupUI(); setupObservers();
    });

    function renderPages() {
      const frag = document.createDocumentFragment();
      const top = document.createElement('div'); top.className = 'reader-decor reader-top-decor'; top.innerHTML = GEOMETRIC_SVG; frag.appendChild(top);
      chapters.forEach((ch, idx) => {
        const chContainer = document.createElement('div');
        chContainer.className = 'chapter-container'; chContainer.dataset.chapterIndex = idx;
        if (chapterMode && idx === currentChIdx) chContainer.classList.add('active');
        if (chapters.length > 1) {
          const div = document.createElement('div'); div.className = 'chapter-divider'; div.textContent = ch.name; chContainer.appendChild(div);
        }
        for (let i = ch.start; i <= ch.end; i++) {
          const wrap = document.createElement('div'); wrap.className = 'page-wrapper'; wrap.dataset.index = i; wrap.dataset.chapter = idx;
          const img = document.createElement('img'); img.className = 'comic-page placeholder';
          pages[i].el = img; pages[i].wrap = wrap; wrap.appendChild(img); chContainer.appendChild(wrap);
        }
        frag.appendChild(chContainer);
      });
      const bot = document.createElement('div'); bot.className = 'reader-decor reader-bottom-decor'; bot.innerHTML = GEOMETRIC_SVG; frag.appendChild(bot);
      readerPages.appendChild(frag);
      if (chapterMode) readerPages.classList.add('mode-chapter');
    }

    async function loadPage(idx) {
      const p = pages[idx]; if (!p || p.url || p.loading) return;
      p.loading = true;
      try {
        const blob = await p.entry.async('blob');
        p.url = URL.createObjectURL(blob); blobUrls.push(p.url);
        if (p.el) {
          p.el.src = p.url;
          p.el.onload = () => {
            p.el.classList.remove('placeholder');
            if (!p.aspectLocked) {
              const nw = p.el.naturalWidth, nh = p.el.naturalHeight;
              if (nw && nh) { p.wrap.style.aspectRatio = `${nw} / ${nh}`; p.aspectLocked = true; }
            }
          };
        }
      } catch(e) { p.loading = false; }
    }

    function unloadDistant() {
      pages.forEach((p, i) => {
        if (p.url && Math.abs(i - currentPage) > MEMORY_WINDOW) {
          URL.revokeObjectURL(p.url); blobUrls = blobUrls.filter(u => u !== p.url);
          p.url = null; p.loading = false; if (p.el) { p.el.src = ''; p.el.classList.add('placeholder'); }
        }
      });
    }

    let visiblePages = new Set(), scrollDebounce = null; 
    function setupObservers() {
      const observer = new IntersectionObserver(entries => {
        if (isTransitioning) return;
        entries.forEach(e => {
          const idx = parseInt(e.target.dataset.index);
          if (e.isIntersecting) visiblePages.add(idx); else visiblePages.delete(idx);
        });
        if (visiblePages.size > 0) {
          const min = Math.min(...Array.from(visiblePages));
          if (min !== currentPage) { currentPage = min; updateIndicator(); }
          clearTimeout(scrollDebounce);
          // High-responsiveness loading with 20 page look-ahead
          scrollDebounce = setTimeout(() => {
            for(let i = currentPage - 2; i <= currentPage + 20; i++) if(i >= 0 && i < pages.length) loadPage(i);
            unloadDistant();
          }, 50); 
        }
      }, { threshold: 0.01 }); 
      document.querySelectorAll('.page-wrapper').forEach(w => observer.observe(w));
    }

    function setupUI() {
      const multi = chapters.length > 1; chapterNav.classList.toggle('hidden', !multi); modeToggle.classList.toggle('hidden', !multi);
      if (chapterMode) { modeToggle.textContent = 'Chapter'; modeToggle.style.fontSize = '0.75rem'; applyChapterMode(); } 
      else { modeToggle.textContent = '∞'; modeToggle.style.fontSize = '1.2rem'; applyScrollMode(); }
      updateIndicator();
    }

    function updateIndicator() {
      const chIdx = chapters.findIndex(ch => currentPage >= ch.start && currentPage <= ch.end);
      if (chIdx !== -1) currentChIdx = chIdx;
      const ch = chapters[currentChIdx];
      if (chapterMode && ch) pageIndicator.textContent = `${currentPage - ch.start + 1} / ${ch.end - ch.start + 1}`;
      else pageIndicator.textContent = `${currentPage + 1} / ${pages.length}`;
      if (chapters.length > 1 && ch) {
        const chLabel = ch.displayNum !== null ? ch.displayNum : (currentChIdx + 1 + baseChapterOffset);
        chapterLabelBtn.textContent = `${chLabel} / ${Math.max(maxChapterNum, chapters.length)}`;
      }
    }

    let jumpDebounce = null; 
    function jumpToChapter(idx) {
      if (idx < 0 || idx >= chapters.length) return;
      isTransitioning = true;
      currentChIdx = idx;
      currentPage = chapters[idx].start;
      if (autoRunning) stopAutoScroll();
      updateIndicator();

      clearTimeout(jumpDebounce);
      jumpDebounce = setTimeout(() => {
        clearTimeout(scrollDebounce); visiblePages.clear(); 
        if (chapterMode) {
          readerPages.classList.add('mode-chapter');
          document.querySelectorAll('.chapter-container').forEach(el => el.classList.toggle('active', parseInt(el.dataset.chapterIndex) === currentChIdx));
          window.scrollTo(0, 0);
        } else {
          readerPages.classList.remove('mode-chapter');
          document.querySelectorAll('.chapter-container').forEach(el => el.classList.remove('active'));
          const target = document.querySelector(`.chapter-container[data-chapter-index="${currentChIdx}"]`);
          if (target) target.scrollIntoView({ behavior: 'auto', block: 'start' });
        }
        for (let i = currentPage; i <= Math.min(currentPage + 10, pages.length - 1); i++) loadPage(i);
        unloadDistant(); 
        isTransitioning = false;
      }, 100); 
    }

    function populateChapterSelector() {
      csList.innerHTML = '';
      chapters.forEach((ch, idx) => {
        const btn = document.createElement('button'); btn.className = 'cs-item' + (idx === currentChIdx ? ' active' : '');
        let label = ch.name;
        if (ch.displayNum !== null && !label.toLowerCase().includes('chapter') && !label.toLowerCase().includes('ch.')) label = `Ch. ${ch.displayNum} - ${label}`;
        btn.textContent = label; btn.onclick = (e) => { e.stopPropagation(); jumpToChapter(idx); closeChapterSelector(); };
        csList.appendChild(btn);
      });
    }

    function openChapterSelector() { populateChapterSelector(); csOverlay.classList.remove('ui-hidden'); setTimeout(() => { const a = csList.querySelector('.active'); if (a) a.scrollIntoView({ block: 'center' }); }, 50); }
    function closeChapterSelector() { csOverlay.classList.add('ui-hidden'); resetIdle(); }

    modeToggle.addEventListener('click', () => {
      if (isTransitioning) return;
      chapterMode = !chapterMode;
      modeToggle.textContent = chapterMode ? 'Chapter' : '∞';
      modeToggle.style.fontSize = chapterMode ? '0.75rem' : '1.2rem';
      jumpToChapter(currentChIdx); 
    });

    function applyChapterMode() { readerPages.classList.add('mode-chapter'); document.querySelectorAll('.chapter-container').forEach(el => el.classList.toggle('active', parseInt(el.dataset.chapterIndex) === currentChIdx)); }
    function applyScrollMode() { readerPages.classList.remove('mode-chapter'); document.querySelectorAll('.chapter-container').forEach(el => el.classList.remove('active')); }

    function updateUI() { readerHeader.classList.toggle('ui-hidden', uiHidden); readerFooter.classList.toggle('ui-hidden', uiHidden); autoscrollBar.classList.toggle('ui-hidden', uiHidden || !autoscrollEnabled); }

    document.getElementById('autoscroll-toggle').addEventListener('click', (e) => { e.stopPropagation(); autoscrollEnabled = !autoscrollEnabled; updateUI(); resetIdle(); });

    let lastTime = 0, idleTimer = null, scrollAccumulator = 0; 
    const pIcon = `<svg style="transform: translateX(1px)" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>`, paIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`, smIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>`, juIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="4" x2="12" y2="16"></line><polyline points="16 12 12 16 8 12"></polyline><line x1="6" y1="20" x2="18" y2="20"></line></svg>`;

    function resetIdle() { clearTimeout(idleTimer); if (!uiHidden) idleTimer = setTimeout(() => { uiHidden = true; updateUI(); }, 4000); }

    function autoStep(timestamp) {
      if (!autoRunning || isTransitioning) return;
      if (!lastTime) lastTime = timestamp;
      if (scrollMode === 'smooth') {
        const dt = timestamp - lastTime; lastTime = timestamp; scrollAccumulator += (SPEED_LEVELS[speedIdx] / 16.6) * dt;
        if (scrollAccumulator >= 1) { const px = Math.floor(scrollAccumulator); window.scrollBy(0, px); scrollAccumulator -= px; }
      } else {
        if (isJumping) {
          const p = Math.min((timestamp - jumpStartTime) / JUMP_DURATION, 1);
          window.scrollTo(0, jumpStartY + (jumpTargetY - jumpStartY) * (1 - Math.pow(1 - p, 3)));
          if (p >= 1) { isJumping = false; lastTime = timestamp; }
        } else {
          if (timestamp - lastTime >= JUMP_LEVELS[jumpIntervalIdx] * 1000) { isJumping = true; jumpStartTime = timestamp; jumpStartY = window.scrollY; jumpTargetY = jumpStartY + (window.innerHeight * 0.70); }
        }
      }
      if (window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 2) stopAutoScroll(); else requestAnimationFrame(autoStep);
    }

    function startAutoScroll() { if (isTransitioning) return; autoRunning = true; lastTime = 0; scrollAccumulator = 0; document.getElementById('as-playpause').innerHTML = paIcon; uiHidden = true; updateUI(); requestAnimationFrame(autoStep); }
    function stopAutoScroll() { autoRunning = false; isJumping = false; document.getElementById('as-playpause').innerHTML = pIcon; resetIdle(); }

    [readerHeader, readerFooter, autoscrollBar].forEach(el => { el.addEventListener('touchstart', resetIdle, {passive: true}); el.addEventListener('click', resetIdle); });
    document.getElementById('as-mode-toggle').addEventListener('click', (e) => { e.stopPropagation(); scrollMode = scrollMode === 'smooth' ? 'jump' : 'smooth'; document.getElementById('as-mode-toggle').innerHTML = scrollMode === 'smooth' ? smIcon : juIcon; isJumping = false; lastTime = 0; updateSpeedLabel(); resetIdle(); });
    document.getElementById('as-playpause').addEventListener('click', () => autoRunning ? stopAutoScroll() : startAutoScroll());
    document.getElementById('as-faster').addEventListener('click', (e) => { e.stopPropagation(); if (scrollMode === 'smooth') { if (speedIdx < SPEED_LEVELS.length-1) speedIdx++; } else { if (jumpIntervalIdx < JUMP_LEVELS.length-1) jumpIntervalIdx++; } updateSpeedLabel(); resetIdle(); });
    document.getElementById('as-slower').addEventListener('click', (e) => { e.stopPropagation(); if (scrollMode === 'smooth') { if (speedIdx > 0) speedIdx--; } else { if (jumpIntervalIdx > 0) jumpIntervalIdx--; } updateSpeedLabel(); resetIdle(); });
    
    function updateSpeedLabel() { 
      if (scrollMode === 'smooth') {
        const d = speedIdx - 3; let l = '•';
        if (d === -3) l = '≡'; else if (d === -2) l = '='; else if (d === -1) l = '-'; else if (d === 1) l = 'I'; else if (d === 2) l = 'II'; else if (d === 3) l = 'III'; else if (d === 4) l = 'IV';
        document.getElementById('as-speed-label').textContent = l;
      } else document.getElementById('as-speed-label').textContent = JUMP_LEVELS[jumpIntervalIdx] + 's';
    }

    readerPages.addEventListener('click', () => { if (autoRunning) { stopAutoScroll(); uiHidden = false; updateUI(); resetIdle(); return; } uiHidden = !uiHidden; updateUI(); if (!uiHidden) resetIdle(); else clearTimeout(idleTimer); });
    chapterLabelBtn.addEventListener('click', (e) => { e.stopPropagation(); openChapterSelector(); });
    csClose.addEventListener('click', (e) => { e.stopPropagation(); closeChapterSelector(); });
    csOverlay.addEventListener('click', (e) => { if (e.target === csOverlay) closeChapterSelector(); });
    document.getElementById('close-btn').addEventListener('click', () => location.reload());
    document.addEventListener('visibilitychange', () => { if (document.hidden && autoRunning) { stopAutoScroll(); uiHidden = false; updateUI(); resetIdle(); } });
    document.getElementById('next-ch').addEventListener('click', (e) => { e.stopPropagation(); jumpToChapter(currentChIdx + 1); resetIdle(); });
    document.getElementById('prev-ch').addEventListener('click', (e) => { e.stopPropagation(); jumpToChapter(currentChIdx - 1); resetIdle(); });
  </script>
</body>
</html>
