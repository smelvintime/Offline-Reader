<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Offline Reader">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Offline Reader</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div id="upload-screen">
    <div class="hero-graphic">
      <svg width="100%" height="48" viewBox="0 0 400 48" fill="var(--accent)">
        <path d="M200 4 L220 24 L200 44 L180 24 Z" opacity="1"/>
        <path d="M200 12 L212 24 L200 36 L188 24 Z" fill="var(--bg)"/>
        <path d="M200 16 L208 24 L200 32 L192 24 Z" opacity="0.8"/>
        <path d="M140 16 L148 24 L140 32 L132 24 Z" opacity="0.6"/>
        <path d="M260 16 L268 24 L260 32 L252 24 Z" opacity="0.6"/>
        <circle cx="90" cy="24" r="2" opacity="0.4"/>
        <circle cx="310" cy="24" r="2" opacity="0.4"/>
        <rect x="20" y="23.5" width="60" height="1" opacity="0.2"/>
        <rect x="100" y="23.5" width="22" height="1" opacity="0.3"/>
        <rect x="156" y="23.5" width="16" height="1" opacity="0.4"/>
        <rect x="320" y="23.5" width="60" height="1" opacity="0.2"/>
        <rect x="278" y="23.5" width="22" height="1" opacity="0.3"/>
        <rect x="228" y="23.5" width="16" height="1" opacity="0.4"/>
      </svg>
    </div>
    <h1>Offline Reader</h1>

    <button id="mobile-upload-btn" onclick="document.getElementById('file-input').click()">
      <div class="btn-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
      </div>
      <div class="btn-text">
        <span class="btn-title">Select Comic Archive</span>
        <span class="btn-sub">Tap to browse .cbz or .zip</span>
      </div>
    </button>

    <input type="file" id="file-input" accept=".cbz,.zip" multiple>
    <p class="hint">600 MB limit</p>
    <div id="library-list" class="hidden"></div>
    <div id="offline-reader-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      Offline mode — connect to internet for the full library
    </div>
    <button id="go-online-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Switch to Online Library
    </button>
    <div id="home-version"></div>
  </div>

  <!-- ═══ ONLINE HOME SCREEN ═══ -->
  <div id="home-screen">
    <header id="home-header">
      <div id="home-header-inner">
        <div id="home-logo">
          <svg width="28" height="28" viewBox="0 0 512 512" fill="#6366f1">
            <path d="M256 112 L400 256 L256 400 L112 256 Z" opacity="0.8"/>
            <path d="M256 144 L368 256 L256 368 L144 256 Z" fill="#0a0a0a"/>
            <path d="M256 176 L336 256 L256 336 L176 256 Z"/>
            <path d="M72 256 L104 288 L136 256 L104 224 Z" opacity="0.5"/>
            <path d="M376 256 L408 288 L440 256 L408 224 Z" opacity="0.5"/>
          </svg>
        </div>
        <div id="home-search-wrap">
          <span id="home-search-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="search" id="home-search" placeholder="Search series…" autocomplete="off" spellcheck="false">
        </div>
        <div id="offline-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
          Offline
        </div>
        <button id="go-offline-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Offline Reader
        </button>
      </div>
    </header>
    <div id="home-body">
      <div id="home-state">
        <div class="spinner"></div>
        <div>Loading library…</div>
      </div>
      <div id="latest-section" style="display:none">
        <div class="home-section-label">Latest Updates</div>
        <div id="latest-updates-list"></div>
      </div>
      <div id="series-section" style="display:none">
        <div class="home-section-label">All Series</div>
        <div id="series-grid"></div>
      </div>
    </div>
  </div>

  <!-- ═══ SERIES DETAIL SCREEN ═══ -->
  <div id="series-screen">
    <header id="series-header">
      <button id="series-back-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="series-header-title">Series</span>
    </header>
    <div id="series-body">
      <div id="series-hero">
        <div id="series-hero-cover-ph">📖</div>
        <div id="series-hero-info">
          <div id="series-hero-title"></div>
          <div id="series-hero-desc"></div>
          <div id="series-hero-meta"></div>
        </div>
      </div>
      <div class="home-section-label">Chapters</div>
      <div id="series-chapter-list"></div>
    </div>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p id="loading-text">Processing archive...</p>
  </div>

  <div id="reader-screen">
    <header id="reader-header">
      <button class="icon-btn" id="close-btn">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10 7L13 10L10 13L7 10Z"/>
          <rect x="1" y="9.5" width="4" height="1" rx="0.5"/>
          <rect x="15" y="9.5" width="4" height="1" rx="0.5"/>
        </svg>
      </button>
      <span id="comic-title">Comic</span>
      <button id="mode-toggle" class="hidden" style="font-size: 0.75rem;">Chapter</button>
    </header>

    <div id="reader-pages"></div>

    <footer id="reader-footer">
      <span id="page-indicator">0/0</span>
      <div id="chapter-nav" class="hidden">
        <button class="icon-btn" id="prev-ch"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <button class="icon-btn" id="chapter-label-btn">1/1</button>
        <button class="icon-btn" id="next-ch"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <button class="icon-btn" id="gap-toggle" style="margin-left: auto;">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="2" width="16" height="6" rx="1"/>
          <rect x="2" y="12" width="16" height="6" rx="1"/>
        </svg>
      </button>
      <button class="icon-btn" id="autoscroll-toggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
      </button>
    </footer>

    <div id="autoscroll-bar" class="ui-hidden">
      <button class="as-btn" id="as-mode-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
      </button>
      <div class="as-divider"></div>
      <button class="as-btn" id="as-slower">−</button>
      <button class="as-btn" id="as-playpause">
        <svg style="transform: translateX(1px)" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
      </button>
      <span id="as-speed-label">•</span>
      <button class="as-btn" id="as-faster">+</button>
    </div>

    <!-- Chapter Selector Modal -->
    <div id="cs-overlay" class="ui-hidden">
      <div id="cs-modal">
        <div class="cs-header">
          <h3>Select Chapter</h3>
          <button id="cs-close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <div id="cs-list"></div>
      </div>
    </div>
  </div>

  <!-- Notices live outside all screen divs so they're visible regardless of which
       screen is currently shown (upload, loading, or reader). -->
  <div id="size-notice" class="hidden">
    <span id="size-notice-text"></span>
    <button id="size-notice-dismiss" aria-label="Dismiss">✕</button>
  </div>
  <div id="order-notice" class="hidden">
    <span id="order-notice-text">⚠ Chapter order may be incorrect — filenames unrecognised</span>
    <button id="order-notice-dismiss" aria-label="Dismiss">✕</button>
  </div>

  <script src="./jszip.min.js"></script>
  <script src="./js/reader.js"></script>
  <script src="./js/online.js"></script>
</body>
</html>
